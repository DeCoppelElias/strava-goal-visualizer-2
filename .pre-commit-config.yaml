repos:
  # ---------------------------------------------------------------------------
  # General hygiene hooks
  # ---------------------------------------------------------------------------
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v4.6.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-toml
      - id: check-json
      - id: check-merge-conflict
      - id: check-added-large-files
        args: ["--maxkb=1024"]
      - id: detect-private-key

  # ---------------------------------------------------------------------------
  # Ruff + Mypy — run from the project venv so the commit gate and
  # `make lint`/`make typecheck` use the SAME tool versions (single source of
  # truth: the dev dependencies in pyproject.toml / uv.lock). Running mypy in the
  # venv also means it sees every installed dependency (e.g. slowapi) natively,
  # so no `additional_dependencies` list to keep in sync.
  # ---------------------------------------------------------------------------
  - repo: local
    hooks:
      - id: ruff
        name: ruff
        entry: uv run ruff check --force-exclude --fix
        language: system
        types_or: [python, pyi]
        require_serial: true
      - id: ruff-format
        name: ruff-format
        entry: uv run ruff format --force-exclude
        language: system
        types_or: [python, pyi]
        require_serial: true
      - id: mypy
        name: mypy
        entry: uv run mypy --config-file pyproject.toml
        language: system
        types_or: [python, pyi]
        exclude: ^(backend/db/migrations/|tests/)
        require_serial: true
