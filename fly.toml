app = '<app-name>'
primary_region = 'ams'

[build]
  # Uses the Dockerfile at the repo root

[env]
  # Non-secret config baked into the deployed image.
  # All secrets (keys, credentials) are set via: fly secrets set KEY=value
  SESSION_COOKIE_SECURE = "true"
  FRONTEND_ORIGIN = "https://<app-name>.fly.dev"

[http_service]
  internal_port = 8000
  force_https = true
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 0

  [[http_service.checks]]
    grace_period = "10s"
    interval = "15s"
    method = "GET"
    timeout = "5s"
    path = "/health"

[[vm]]
  memory = "256mb"
  cpu_kind = "shared"
  cpus = 1
