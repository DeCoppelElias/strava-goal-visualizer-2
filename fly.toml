# fly.toml app configuration file generated for strava-goal-visualizer on 2026-06-19T16:49:38+02:00
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = 'strava-goal-visualizer'
primary_region = 'ams'

[build]

[env]
  FRONTEND_ORIGIN = 'https://strava-goal-visualizer.fly.dev'
  SESSION_COOKIE_SECURE = 'true'

[http_service]
  internal_port = 8000
  force_https = true
  auto_stop_machines = 'stop'
  auto_start_machines = true
  min_machines_running = 0

  [[http_service.checks]]
    interval = '15s'
    timeout = '5s'
    grace_period = '10s'
    method = 'GET'
    path = '/health'

[[vm]]
  memory = '256mb'
  cpu_kind = 'shared'
  cpus = 1
